<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitty War</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 20px;
        }
        h1 {
            color: #e94560;
            font-size: 36px;
            margin: 10px;
        }
        .stats {
            background: #16213e;
            padding: 15px;
            margin: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-around;
            border: 2px solid #e94560;
        }
        .stat {
            font-size: 20px;
        }
        .stat span {
            color: #ffe75e;
            font-weight: bold;
            font-size: 24px;
        }
        .game-area {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            margin: 20px;
            border: 3px solid #e94560;
        }
        .kitty {
            font-size: 120px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 20px #e94560);
        }
        .kitty:active {
            transform: scale(1.2);
        }
        .monster {
            font-size: 100px;
            margin: 20px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .health-bar {
            width: 80%;
            height: 25px;
            background: #333;
            border-radius: 15px;
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #e94560;
        }
        .health {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff4757);
            transition: width 0.3s;
        }
        button {
            background: #0f3460;
            color: white;
            border: 2px solid #e94560;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 15px;
            margin: 10px;
            cursor: pointer;
        }
        button:active {
            background: #e94560;
        }
        .damage {
            position: absolute;
            color: #ffd700;
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            animation: float 1s forwards;
        }
        @keyframes float {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <h1>🐱 KITTY WAR ⚔️</h1>
    
    <div class="stats">
        <div class="stat">🐟 Рыбки: <span id="fish">0</span></div>
        <div class="stat">⬆️ Уровень: <span id="level">1</span></div>
        <div class="stat">💀 Убито: <span id="kills">0</span></div>
    </div>
    
    <div class="game-area">
        <div class="kitty" id="kitty" onclick="attack()">
            🐱‍👤
        </div>
        
        <div id="monsterName" style="font-size: 20px; color: #e94560;">КАПИБАРА-МОНСТР</div>
        
        <div class="monster" id="monster">
            👾
        </div>
        
        <div class="health-bar">
            <div class="health" id="health" style="width: 100%"></div>
        </div>
    </div>
    
    <button onclick="upgrade()">🔪 Улучшить когти (10 🐟)</button>
    
    <div id="damageArea"></div>

    <script>
        let fish = 0;
        let level = 1;
        let damage = 10;
        let kills = 0;
        let monsterHealth = 100;
        let maxHealth = 100;
        
        const monsters = [
            {name: "КАПИБАРА-МОНСТР", emoji: "👾", health: 100},
            {name: "ЗОМБИ-ЕНОТ", emoji: "🧟", health: 200},
            {name: "ДЕМОН-ЛИС", emoji: "🦊🔥", health: 400},
            {name: "КРИСТАЛЛ-ВОЛК", emoji: "🐺💎", health: 800},
            {name: "ДРАКО-КОТ", emoji: "🐉😺", health: 1600}
        ];
        let monsterIndex = 0;
        
        function attack() {
            // Анимация
            document.getElementById('kitty').style.transform = 'scale(1.3)';
            setTimeout(() => {
                document.getElementById('kitty').style.transform = 'scale(1)';
            }, 100);
            
            // Урон
            monsterHealth -= damage;
            showDamage(damage);
            
            // Обновление полоски
            let percent = (monsterHealth / maxHealth) * 100;
            if (percent < 0) percent = 0;
            document.getElementById('health').style.width = percent + '%';
            
            // Монстр умер
            if (monsterHealth <= 0) {
                fish += 10 * level;
                kills++;
                
                if (kills % 5 === 0) {
                    level++;
                    damage += 5;
                }
                
                monsterIndex++;
                if (monsterIndex >= monsters.length) monsterIndex = monsters.length - 1;
                
                let monster = monsters[monsterIndex];
                document.getElementById('monsterName').innerHTML = monster.name;
                document.getElementById('monster').innerHTML = monster.emoji;
                maxHealth = monster.health;
                monsterHealth = maxHealth;
                
                updateDisplay();
            }
            
            updateDisplay();
        }
        
        function showDamage(amount) {
            let div = document.createElement('div');
            div.className = 'damage';
            div.innerHTML = '-' + amount;
            div.style.left = Math.random() * 300 + 'px';
            div.style.top = '300px';
            document.getElementById('damageArea').appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }
        
        function upgrade() {
            if (fish >= 10) {
                fish -= 10;
                damage += 5;
                updateDisplay();
            }
        }
        
        function updateDisplay() {
            document.getElementById('fish').innerHTML = fish;
            document.getElementById('level').innerHTML = level;
            document.getElementById('kills').innerHTML = kills;
        }
    </script>
</body>
